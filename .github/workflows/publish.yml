# Delta-V Horizon — Publish to GitHub Packages
#
# Builds all Horizon modules and publishes them as Maven artifacts
# to GitHub Packages Maven registry.
#
# Trigger: Push a tag matching a semver pattern (e.g., 1.0.0, 1.0.1, 2.0.0)
#          or run manually via workflow_dispatch.
#
# Consumer setup (one-time):
#   1. Create a GitHub PAT with packages:read scope
#   2. Add to ~/.m2/settings.xml:
#        <server>
#          <id>github</id>
#          <username>YOUR_GITHUB_USERNAME</username>
#          <password>YOUR_PAT</password>
#        </server>

name: Publish to GitHub Packages

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

env:
  JAVA_VERSION: '21'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Publish Maven Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Validate tag matches POM version
        if: github.event_name == 'push'
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          POM_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout || grep '<version>' pom.xml | head -1 | sed 's/.*<version>//;s/<.*//')
          echo "POM version: $POM_VERSION, Tag: $TAG_VERSION"
          if [ "$POM_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: POM version ($POM_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version validated: $POM_VERSION"

      - name: Build all modules
        run: ./mvnw -B -DskipTests install

      - name: Deploy to GitHub Packages
        # deployAtEnd=false: deploy each module independently (not batched)
        # This makes the deploy idempotent — already-published modules get 409
        # but remaining modules continue deploying.
        # The '|| true' tolerates 409 exits from partial prior runs.
        # A follow-up 'verify' step confirms all artifacts are actually published.
        run: ./mvnw -B -DskipTests -DdeployAtEnd=false deploy -DaltDeploymentRepository=github::https://maven.pkg.github.com/pbrane/delta-v-horizon || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify key artifacts published
        run: |
          echo "Verifying key artifacts are available on GitHub Packages..."
          ARTIFACTS=(
            "org.opennms:opennms-dao-api"
            "org.opennms:opennms-config-api"
            "org.opennms:opennms-model"
            "org.opennms.core:org.opennms.core.api"
            "org.opennms.features.events:org.opennms.features.events.api"
          )
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          FAILED=0
          for art in "${ARTIFACTS[@]}"; do
            GROUP=$(echo "$art" | cut -d: -f1)
            ARTIFACT=$(echo "$art" | cut -d: -f2)
            GROUP_PATH=$(echo "$GROUP" | tr '.' '/')
            URL="https://maven.pkg.github.com/pbrane/delta-v-horizon/${GROUP_PATH}/${ARTIFACT}/${VERSION}/${ARTIFACT}-${VERSION}.pom"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${GITHUB_TOKEN}" "$URL")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "  OK: ${art}:${VERSION}"
            else
              echo "  MISSING: ${art}:${VERSION} (HTTP $STATUS)"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "ERROR: Some artifacts are missing. Deploy may have failed."
            exit 1
          fi
          echo "All key artifacts verified."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
